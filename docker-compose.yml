services:
  api:
    build:
      context: ./apps/api-legacy
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./apps/api-legacy/.env
    restart: unless-stopped
    networks:
      - agenrix-network

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    env_file:
      - ./apps/worker/.env
    restart: unless-stopped
    networks:
      - agenrix-network
    depends_on:
      - api

  frontend:
    build:
      context: ./apps/app-legacy
      dockerfile: Dockerfile
    ports:
      - "80:80"
    env_file:
      - ./apps/app-legacy/.env
    restart: unless-stopped
    networks:
      - agenrix-network
    depends_on:
      - api

networks:
  agenrix-network:
    driver: bridge
